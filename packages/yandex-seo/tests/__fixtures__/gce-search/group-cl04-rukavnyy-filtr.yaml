      Mobile: "NO"

  - variant_id: B
    Type: TEXT_AD
    TextAd:
      Title: Промышленные рукавные фильтры
      Title2: Опыт 30+ лет, 150+ проектов
      Text: Производим блоки и батареи. Металлургия, ТЭЦ, цемент. КП в течение 1 часа.
      Href: https://gas-cleaning.ru/
      Mobile: "NO"

  - variant_id: C
    Type: TEXT_AD
    TextAd:
      Title: Рукавный фильтр для производства
